name: release

# Build per-platform binaries and attach them to the GitHub Release when a version
# tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: tar -czf "requests-tui-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" requests-tui

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: requests-tui-${{ matrix.target }}.tar.gz
